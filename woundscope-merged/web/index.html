<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WoundScope · ABI Eligibility</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">ABI</span>
      <div>
        <div class="module">WoundScope</div>
        <div class="tagline">Medicare Part&nbsp;B Wound-Care Eligibility</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="facility-pill"><span class="pulse"></span><span id="live-count">live</span></span>
      <span class="phi-toggle" id="phi-toggle" title="HIPAA minimum-necessary: PHI masked by default">
        <span class="lock">🔒</span> <span id="phi-state">PHI Masked</span>
      </span>
      <button id="export" class="btn ghost">Export CSV</button>
    </div>
  </header>

  <div class="banner">
    <span class="lock">🔒</span>
    <span>HIPAA-aligned: PHI minimized by default (minimum-necessary), processed locally,
    every decision audit-logged. Demo runs on synthetic patients.</span>
  </div>

  <section class="kpis" id="kpis"></section>

  <section class="toolbar">
    <input id="search" class="search" type="search" placeholder="Search patient name or ID…" />
    <div class="chips" id="decision-chips"></div>
    <select id="facility" class="select"></select>
    <select id="status-filter" class="select">
      <option value="">Any status</option>
      <option value="open">Open</option>
      <option value="billed">Billed</option>
      <option value="dismissed">Dismissed</option>
    </select>
    <label class="kicker" style="margin:0;">conf ≥ <span id="conf-val">0.00</span>
      <input id="conf" type="range" min="0" max="1" step="0.05" value="0" /></label>
  </section>

  <main class="layout">
    <div class="panel">
      <div class="queue-head"><span class="kicker" style="margin:0;">Review queue · <span id="queue-count">—</span></span></div>
      <div class="queue" id="queue"></div>
    </div>
    <aside class="panel detail" id="detail">
      <div class="detail-empty">Select a patient to see the eligibility evaluation log.</div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
